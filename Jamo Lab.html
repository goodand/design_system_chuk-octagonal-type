<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>Jamo Lab · ㅡ × ㅣ</title>
<style>
  @font-face {
    font-family: 'IBM Plex Sans KR';
    src: url('fonts/IBMPlexSansKR-Regular.ttf') format('truetype');
    font-weight: 300 700; font-display: swap;
  }
  :root { --ink:#141414; --ink-2:#4a4a4a; --ink-3:#7a7a7a; --paper:#faf9f5; --bg:#f4f3ef; --line:#e6e1d6; --accent:#d9531e; }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans KR', system-ui, sans-serif; }
  .lab { max-width: 1200px; margin: 0 auto; padding: 40px 32px 80px; }
  header h1 { font-size: 28px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
  header .meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-3); letter-spacing: 0.02em; }
  section { margin-top: 48px; }
  section h2 { font-size: 20px; font-weight: 700; margin: 0 0 20px; display: flex; align-items: baseline; gap: 12px; }
  section h2 .tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .row4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .p { background: #fff; border: 1px solid var(--line); }
  .ph { padding: 12px 14px 10px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .pt { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
  .ps { font-size: 10px; color: var(--ink-3); letter-spacing: 0.02em; }
  .note { margin-top: 14px; font-size: 12px; color: var(--ink-2); line-height: 1.6; max-width: 80ch; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="jamo-lab.jsx"></script>
</body>
</html>
